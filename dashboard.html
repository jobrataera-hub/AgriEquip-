<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#22C55E">
<title>AgriEquip</title>
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/themes.css">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">

<!-- BRIDGE: exposes module functions to global onclick handlers -->
<script>
  // These are called by onclick in HTML, they delegate to the loaded module
  function showSection(id)       { if(window._app) window._app.showSection(id); }
  function copyReferral()        { if(window._app) window._app.copyReferral(); }
  function setTheme(t)           { if(window._app) window._app.setTheme(t); }
  function askTeff(q)            { if(window._app) window._app.askTeff(q); }
  function sendTeff()            { if(window._app) window._app.sendTeff(); }
  function clearTeffChat()       { if(window._app) window._app.clearTeffChat(); }
  function completeTask(id,xp)   { if(window._app) window._app.completeTask(id,xp); }
  function activateVIP(n,f)      { if(window._app) window._app.activateVIP(n,f); }
  function submitDeposit()       { if(window._app) window._app.submitDeposit(); }
  function submitWithdraw()      { if(window._app) window._app.submitWithdraw(); }
  function showDepositForm()     { if(window._app) window._app.showDepositForm(); }
  function showWithdrawForm()    { if(window._app) window._app.showWithdrawForm(); }
  function backToWallet()        { if(window._app) window._app.backToWallet(); }
  function submitListing()       { if(window._app) window._app.submitListing(); }
  function toggleListingForm()   { if(window._app) window._app.toggleListingForm(); }
  function filterEquipment()     { if(window._app) window._app.filterEquipment(); }
  function saveProfile()         { if(window._app) window._app.saveProfile(); }
  function handleSignOut()       { if(window._app) window._app.handleSignOut(); }
  function navBack()             { if(window._app) window._app.navBack(); }
  function navForward()          { if(window._app) window._app.navForward(); }

  // Error display
  window.onerror = function(msg, url, line) {
    const existing = document.getElementById('errBanner');
    if (existing) existing.remove();
    const d = document.createElement('div');
    d.id = 'errBanner';
    d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#dc2626;color:white;padding:12px 16px;z-index:99999;font-size:11px;word-break:break-all;line-height:1.4';
    d.textContent = 'ERROR: ' + msg + ' | ' + (url||'').split('/').pop() + ' L' + line;
    document.body.prepend(d);
    setTimeout(() => d.remove(), 8000);
  };
</script>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-profile">
    <div class="sidebar-avatar" id="sidebarInitial">?</div>
    <div class="sidebar-username" id="sidebarName">AgriEquip User</div>
    <div class="sidebar-email" id="sidebarEmail">Loading...</div>
    <div class="sidebar-vip-badge" id="sidebarVip">⚪ Free Member</div>
  </div>
  <div class="sidebar-header">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <rect width="26" height="26" rx="7" fill="url(#sg)"/>
          <defs><linearGradient id="sg" x1="0" y1="0" x2="26" y2="26"><stop stop-color="#22C55E"/><stop offset="1" stop-color="#06B6D4"/></linearGradient></defs>
          <path d="M6 18 L11 13 L15 16 L20 9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="18" cy="7" r="2.5" fill="white" opacity="0.9"/>
        </svg>
      </div>
      <span class="logo-text">AgriEquip</span>
    </div>
    <button class="close-btn" onclick="closeSidebar()">✕</button>
  </div>
  <nav class="nav-menu">
    <a href="#" class="nav-link active" data-section="home"     onclick="showSection('home');return false"><span class="nav-icon">🏠</span> Home</a>
    <a href="#" class="nav-link" data-section="browse"          onclick="showSection('browse');return false"><span class="nav-icon">🔍</span> Browse Equipment</a>
    <a href="#" class="nav-link" data-section="listings"        onclick="showSection('listings');return false"><span class="nav-icon">📦</span> My Listings</a>
    <a href="#" class="nav-link" data-section="wallet"          onclick="showSection('wallet');return false"><span class="nav-icon">💳</span> Wallet</a>
    <a href="#" class="nav-link" data-section="vip"             onclick="showSection('vip');return false"><span class="nav-icon">💎</span> VIP Plans</a>
    <a href="#" class="nav-link" data-section="tasks"           onclick="showSection('tasks');return false"><span class="nav-icon">✅</span> Tasks</a>
    <a href="#" class="nav-link" data-section="academy"         onclick="showSection('academy');return false"><span class="nav-icon">🎓</span> Academy</a>
    <a href="#" class="nav-link" data-section="community"       onclick="showSection('community');return false"><span class="nav-icon">👥</span> Community</a>
    <a href="#" class="nav-link" data-section="teffai"          onclick="showSection('teffai');return false"><span class="nav-icon">🤖</span> Teff AI</a>
    <a href="#" class="nav-link" data-section="profile"         onclick="showSection('profile');return false"><span class="nav-icon">👤</span> Profile</a>
    <a href="#" class="nav-link" data-section="settings"        onclick="showSection('settings');return false"><span class="nav-icon">⚙️</span> Settings</a>
    <a href="#" class="nav-link" data-section="about"           onclick="showSection('about');return false"><span class="nav-icon">ℹ️</span> About & Legal</a>
  </nav>
  <button class="logout-btn" onclick="handleSignOut()">🚪 Sign Out</button>
</aside>

<!-- MAIN -->
<main class="main-content">
  <div class="topbar">
    <div class="topbar-left">
      <button class="open-menu-btn" onclick="openSidebar()">☰
        
        <span></span><span></span><span></span>
      </button>
      
      <span id="pageTitle" class="topbar-title">🏠 Home</span>
    </div>
    <div class="topbar-right">
      <div class="user-pill" onclick="showSection('profile')">
        <div class="user-avatar" id="userInitial">?</div>
        <span id="userEmail"></span>
     

      </div>
      
    </div>
  </div>

  <!-- All section content rendered here by JS -->
  <div class="page-content" id="pageContent"></div>
</main>

<!-- Teff AI floating button -->
<button class="teff-fab" onclick="showSection('teffai')">
  🤖<span class="teff-fab-label">Ask Teff AI</span>
</button>

<!-- Sidebar open/close helpers (non-module, safe to call from onclick) -->
<script>
  function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('active'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
</script>

<!-- Load ONLY ONE dashboard module -->
<script type="module" src="js/app.js?v=5"></script>

</body>
</html>
