<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriEquip</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Poppins',sans-serif}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
@keyframes progress{from{width:0}to{width:100%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes logoBounce{0%{transform:scale(0.3) translateY(50px);opacity:0}55%{transform:scale(1.1) translateY(-12px);opacity:1}72%{transform:scale(0.97) translateY(4px)}85%{transform:scale(1.03) translateY(-2px)}100%{transform:scale(1) translateY(0);opacity:1}}
@keyframes logoRotate{0%{transform:rotate(0deg)}25%{transform:rotate(4deg) scale(1.03)}50%{transform:rotate(-2deg)}75%{transform:rotate(1.5deg)}100%{transform:rotate(0deg)}}
@keyframes logoPulse{0%,100%{box-shadow:0 0 40px rgba(34,197,94,0.5),0 0 80px rgba(34,197,94,0.2),0 25px 60px rgba(0,0,0,0.6)}50%{box-shadow:0 0 70px rgba(34,197,94,0.8),0 0 130px rgba(34,197,94,0.4),0 25px 60px rgba(0,0,0,0.6)}}
@keyframes wheelSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes wheatSway{0%,100%{transform:skewX(-3deg)}50%{transform:skewX(3deg)}}
@keyframes sunRise{0%{transform:translateY(18px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes cloudDrift{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}
@keyframes orbit1{from{transform:rotate(0deg) translateX(82px) rotate(0deg)}to{transform:rotate(360deg) translateX(82px) rotate(-360deg)}}
@keyframes orbit2{from{transform:rotate(180deg) translateX(108px) rotate(-180deg)}to{transform:rotate(540deg) translateX(108px) rotate(-540deg)}}
@keyframes particleFloat{0%{transform:translateY(0);opacity:0.7}100%{transform:translateY(-110px);opacity:0}}
@keyframes rayPulse{0%,100%{opacity:0.04}50%{opacity:0.09}}
@keyframes textGlow{0%,100%{text-shadow:0 0 20px rgba(34,197,94,0.3)}50%{text-shadow:0 0 45px rgba(34,197,94,0.7)}}
@keyframes puff{0%{transform:translate(0,0) scale(0.4);opacity:0.6}100%{transform:translate(-10px,-16px) scale(2);opacity:0}}
@keyframes tractorEnter{0%{transform:translateX(-50px);opacity:0}60%{transform:translateX(3px);opacity:1}80%{transform:translateX(-1px)}100%{transform:translateX(0);opacity:1}}
@keyframes screenFade{from{opacity:0}to{opacity:1}}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 35%,#0b2e1c 0%,#061428 35%,#020c18 65%,#000 100%)}
.rays{position:fixed;inset:0;overflow:hidden;pointer-events:none}
.ray{position:absolute;top:0;width:2px;height:100%;background:linear-gradient(180deg,transparent 0%,rgba(34,197,94,0.07) 50%,transparent 100%);animation:rayPulse 3s ease-in-out infinite}
.particles{position:fixed;inset:0;pointer-events:none}
.particle{position:absolute;border-radius:50%;animation:particleFloat linear infinite}
.orbit-system{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:0;height:0;opacity:0;animation:fadeIn 0.5s ease 2.8s forwards}
.orb{position:absolute;border-radius:50%;top:0;left:0}
.orb1{width:9px;height:9px;background:#22C55E;box-shadow:0 0 14px #22C55E;margin:-4.5px 0 0 -4.5px;animation:orbit1 4s linear infinite}
.orb2{width:6px;height:6px;background:#06B6D4;box-shadow:0 0 10px #06B6D4;margin:-3px 0 0 -3px;animation:orbit2 6s linear infinite}
.agri-bg{position:fixed;inset:0;pointer-events:none;opacity:0;animation:fadeIn 1s ease 1.5s forwards}
.wheat-bg{position:absolute;font-size:1.8rem;opacity:0.07}
.leaf-bg{position:absolute;font-size:1.4rem;opacity:0.06}
.content{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo-wrap{position:relative;margin-bottom:36px;opacity:0;animation:logoBounce 1.3s cubic-bezier(0.34,1.4,0.64,1) 0.8s forwards}
.logo-icon{width:140px;height:140px;border-radius:34px;position:relative;overflow:hidden;background:linear-gradient(145deg,#22C55E 0%,#16A34A 45%,#0d8c3a 100%);box-shadow:0 0 45px rgba(34,197,94,0.55),0 0 90px rgba(34,197,94,0.25),0 28px 65px rgba(0,0,0,0.65),inset 0 1px 0 rgba(255,255,255,0.28);border:1.5px solid rgba(255,255,255,0.18)}
.logo-icon::before{content:'';position:absolute;top:0;left:0;right:0;height:52%;background:linear-gradient(180deg,rgba(255,255,255,0.24) 0%,transparent 100%);border-radius:34px 34px 50% 50%;z-index:2}
.logo-svg-wrap{position:relative;z-index:3;width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:14px}
.glow-ring{position:absolute;border-radius:50%;border:1px solid rgba(34,197,94,0.18);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:logoPulse 2s ease-in-out infinite}
.ring1{width:175px;height:175px}
.ring2{width:218px;height:218px;border-color:rgba(34,197,94,0.1);animation-delay:0.3s}
.ring3{width:265px;height:265px;border-color:rgba(34,197,94,0.05);animation-delay:0.6s}
.tractor-g{animation:tractorEnter 1.2s cubic-bezier(0.34,1.2,0.64,1) 1.5s both}
.big-wheel{transform-origin:25px 61px;animation:wheelSpin 0.85s linear 1.8s infinite}
.sm-wheel{transform-origin:52px 58px;animation:wheelSpin 0.65s linear 1.8s infinite}
.wheat-g1{transform-origin:72px 62px;animation:wheatSway 2s ease-in-out 2s infinite}
.wheat-g2{transform-origin:83px 62px;animation:wheatSway 2s ease-in-out 2.2s infinite}
.wheat-g3{transform-origin:93px 62px;animation:wheatSway 2s ease-in-out 2.4s infinite}
.sun-g{animation:sunRise 1s ease 1.2s both}
.cloud-g1{animation:cloudDrift 4s ease-in-out 2.5s infinite}
.puff1{animation:puff 1.4s ease-out 2.2s infinite}
.puff2{animation:puff 1.4s ease-out 2.7s infinite}
.logo-name{font-size:2.7rem;font-weight:900;color:white;letter-spacing:-0.5px;text-align:center;opacity:0;animation:slideUp 0.8s ease 2s both,textGlow 3s ease-in-out 3s infinite;font-family:'Georgia',serif}
.logo-sub{font-size:0.76rem;color:rgba(255,255,255,0.5);letter-spacing:4px;text-transform:uppercase;text-align:center;margin-top:8px;opacity:0;animation:slideUp 0.7s ease 2.3s both}
.dot-sep{color:#22C55E}
.logo-tag{font-size:0.68rem;color:rgba(255,255,255,0.28);letter-spacing:2px;text-align:center;margin-top:4px;opacity:0;animation:slideUp 0.6s ease 2.5s both}
.bar-wrap{margin-top:44px;opacity:0;animation:fadeIn 0.5s ease 2.7s forwards}
.bar-out{width:180px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.bar-in{height:100%;background:linear-gradient(90deg,#22C55E,#06B6D4,#22C55E);border-radius:2px;animation:progress 5.2s ease 3s both}
.bar-txt{color:rgba(255,255,255,0.18);font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-top:10px;animation:blink 1.5s infinite 3.2s}
.ver{position:fixed;bottom:16px;font-size:0.6rem;color:rgba(255,255,255,0.12);letter-spacing:1.5px;opacity:0;animation:fadeIn 0.5s ease 2.8s forwards}
.fade-end{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;animation:screenFade 0.8s ease 8.2s forwards}
</style>
</head>
<body>
<div class="bg"></div>
<div class="rays" id="rays"></div>
<div class="particles" id="particles">
<div class="orbit-system">
<div class="orb orb1"></div>
<div class="orb orb2"></div>
</div>
</div>
<div class="agri-bg">
<svg style="position:absolute;bottom:0;left:0;right:0;height:160px" viewBox="0 0 400 140" preserveAspectRatio="none">
<defs><linearGradient id="mtG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22C55E" stop-opacity="0.09"/><stop offset="100%" stop-color="#22C55E" stop-opacity="0.02"/></linearGradient></defs>
<path d="M0 140 L45 70 L85 100 L135 35 L185 80 L225 25 L275 70 L315 40 L365 78 L400 50 L400 140 Z" fill="url(#mtG)"/>
<path d="M0 140 L65 90 L155 62 L255 58 L355 68 L400 85 L400 140 Z" fill="rgba(34,197,94,0.04)"/>
</svg>
<div class="wheat-bg" style="bottom:14%;left:4%;animation:wheatSway 3s ease-in-out infinite">🌾</div>
<div class="wheat-bg" style="bottom:19%;right:5%;animation:wheatSway 3.5s ease-in-out infinite 0.5s">🌾</div>
<div class="wheat-bg" style="bottom:11%;left:17%;animation:wheatSway 2.8s ease-in-out infinite 1s">🌿</div>
<div class="leaf-bg" style="top:14%;left:7%;animation:wheatSway 4s ease-in-out infinite">🍃</div>
<div class="leaf-bg" style="top:19%;right:9%;animation:wheatSway 3.5s ease-in-out infinite 1s">🍃</div>
</div>
<div class="content">
<div class="logo-wrap" id="logoWrap">
<div class="glow-ring ring1"></div>
<div class="glow-ring ring2"></div>
<div class="glow-ring ring3"></div>
<div class="logo-icon">
<div class="logo-svg-wrap">
<svg width="112" height="112" viewBox="0 0 112 112" fill="none">
<rect x="0" y="0" width="112" height="55" rx="8" fill="rgba(255,255,255,0.04)"/>
<g class="sun-g"><circle cx="18" cy="20" r="9.5" fill="rgba(255,255,255,0.18)"/><circle cx="18" cy="20" r="5.5" fill="rgba(255,255,255,0.62)"/><line x1="18" y1="7" x2="18" y2="4" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/><line x1="27" y1="11" x2="29" y2="9" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/><line x1="31" y1="20" x2="34" y2="20" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/></g>
<g class="cloud-g1"><ellipse cx="58" cy="16" rx="11" ry="4.5" fill="rgba(255,255,255,0.12)"/><ellipse cx="52" cy="18" rx="7" ry="3.5" fill="rgba(255,255,255,0.09)"/></g>
<circle class="puff1" cx="57" cy="46" r="3" fill="rgba(255,255,255,0.22)"/>
<circle class="puff2" cx="55" cy="44" r="2" fill="rgba(255,255,255,0.16)"/>
<g class="tractor-g">
<rect x="10" y="58" width="44" height="23" rx="6.5" fill="rgba(255,255,255,0.88)"/>
<rect x="38" y="48" width="21" height="17" rx="5.5" fill="rgba(255,255,255,0.72)"/>
<rect x="41" y="51" width="15" height="9.5" rx="3" fill="rgba(6,182,212,0.42)"/>
<rect x="55" y="44" width="3" height="7" rx="1.5" fill="rgba(255,255,255,0.58)"/>
<circle class="big-wheel" cx="25" cy="82" r="13" fill="rgba(10,22,40,0.85)" stroke="rgba(255,255,255,0.9)" stroke-width="2.5"/>
<circle cx="25" cy="82" r="5.5" fill="rgba(255,255,255,0.2)"/>
<line x1="25" y1="69" x2="25" y2="95" stroke="rgba(255,255,255,0.38)" stroke-width="2"/>
<line x1="12" y1="82" x2="38" y2="82" stroke="rgba(255,255,255,0.38)" stroke-width="2"/>
<circle class="sm-wheel" cx="52" cy="79" r="9" fill="rgba(10,22,40,0.85)" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
<circle cx="52" cy="79" r="4" fill="rgba(255,255,255,0.2)"/>
<line x1="52" y1="70" x2="52" y2="88" stroke="rgba(255,255,255,0.32)" stroke-width="1.5"/>
<line x1="43" y1="79" x2="61" y2="79" stroke="rgba(255,255,255,0.32)" stroke-width="1.5"/>
</g>
<g class="wheat-g1"><line x1="72" y1="84" x2="72" y2="32" stroke="rgba(255,255,255,0.82)" stroke-width="2.5" stroke-linecap="round"/><ellipse cx="72" cy="26" rx="5" ry="10.5" fill="rgba(255,255,255,0.82)" transform="rotate(-13 72 26)"/><line x1="68" y1="46" x2="72" y2="46" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/></g>
<g class="wheat-g2"><line x1="83" y1="84" x2="83" y2="36" stroke="rgba(255,255,255,0.72)" stroke-width="2" stroke-linecap="round"/><ellipse cx="83" cy="30" rx="4.5" ry="9.5" fill="rgba(255,255,255,0.72)" transform="rotate(10 83 30)"/></g>
<g class="wheat-g3"><line x1="94" y1="84" x2="94" y2="38" stroke="rgba(255,255,255,0.62)" stroke-width="2" stroke-linecap="round"/><ellipse cx="94" cy="32" rx="4" ry="9" fill="rgba(255,255,255,0.62)" transform="rotate(-6 94 32)"/></g>
<rect x="8" y="86" width="96" height="5" rx="2.5" fill="rgba(255,255,255,0.22)"/>
<rect x="8" y="95" width="96" height="4" rx="2" fill="rgba(255,255,255,0.13)"/>
<rect x="8" y="103" width="96" height="3" rx="1.5" fill="rgba(255,255,255,0.07)"/>
</svg>
</div>
</div>
</div>
<div class="logo-name">AgriEquip</div>
<div class="logo-sub">Grow <span class="dot-sep">•</span> Invest <span class="dot-sep">•</span> Prosper</div>
<div class="logo-tag">Agricultural Rental Marketplace 🇪🇹</div>
<div class="bar-wrap">
<div class="bar-out"><div class="bar-in"></div></div>
<div class="bar-txt">Loading...</div>
</div>
</div>
<div class="ver">v1.0.0 • Made in Ethiopia</div>
<div class="fade-end"></div>
<script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
const rEl=document.getElementById('rays');
for(let i=0;i<12;i++){const r=document.createElement('div');r.className='ray';r.style.cssText=`left:${4+i*8}%;transform:rotate(${(i-6)*3}deg);animation-delay:${i*0.2}s`;rEl.appendChild(r);}
const pEl=document.getElementById('particles');
const cols=['#22C55E','#16A34A','#06B6D4','#F59E0B'];
for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';const s=2+Math.random()*5;const c=cols[Math.floor(Math.random()*cols.length)];p.style.cssText=`width:${s}px;height:${s}px;background:${c};left:${Math.random()*100}%;top:${25+Math.random()*55}%;opacity:${0.3+Math.random()*0.5};animation-duration:${3+Math.random()*5}s;animation-delay:${Math.random()*4}s;box-shadow:0 0 ${s*2}px ${c}`;pEl.appendChild(p);}
const lw=document.getElementById('logoWrap');
setTimeout(()=>{lw.style.animation='logoRotate 1.5s ease forwards';},2300);
setTimeout(()=>{lw.style.animation='logoPulse 2.2s ease-in-out infinite';},4000);
sessionStorage.setItem('splashSeen','1');
setTimeout(()=>{window.location.href='login.html';},8400);
</script>
</body>
</html>
