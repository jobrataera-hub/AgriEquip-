<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22C55E">
  <title>AgriEquip</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0a1628;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:100vh;overflow:hidden;
      font-family:'Poppins',sans-serif;
    }
    @keyframes scaleUp{
      0%{transform:scale(0) rotate(-15deg);opacity:0}
      60%{transform:scale(1.18) rotate(3deg);opacity:1}
      100%{transform:scale(1) rotate(0);opacity:1}
    }
    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-14px)}
    }
    @keyframes glow{
      0%,100%{filter:drop-shadow(0 0 15px rgba(34,197,94,0.4))}
      50%{filter:drop-shadow(0 0 45px rgba(34,197,94,0.9))}
    }
    @keyframes slideUp{
      from{opacity:0;transform:translateY(22px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes progress{
      from{width:0%}to{width:100%}
    }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    @keyframes orbit1{
      from{transform:rotate(0deg) translateX(78px) rotate(0deg)}
      to{transform:rotate(360deg) translateX(78px) rotate(-360deg)}
    }
    @keyframes orbit2{
      from{transform:rotate(180deg) translateX(58px) rotate(-180deg)}
      to{transform:rotate(540deg) translateX(58px) rotate(-540deg)}
    }
    @keyframes bgPulse{
      0%,100%{opacity:0.5}50%{opacity:1}
    }

    .bg{
      position:fixed;inset:0;
      background:
        radial-gradient(ellipse at 25% 35%,rgba(34,197,94,0.1) 0%,transparent 55%),
        radial-gradient(ellipse at 75% 65%,rgba(6,182,212,0.08) 0%,transparent 55%);
      animation:bgPulse 4s ease-in-out infinite;
    }

    .wrap{
      text-align:center;position:relative;
      z-index:10;padding:20px;
    }

    .orbit-system{
      position:relative;width:170px;height:170px;
      margin:0 auto 28px;
    }
    .logo-svg{
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:115px;height:115px;
      animation:scaleUp 1s cubic-bezier(0.34,1.56,0.64,1) 0.2s both,
                float 4s ease-in-out 1.4s infinite,
                glow 3s ease-in-out 1.4s infinite;
    }
    .orb{
      position:absolute;top:50%;left:50%;
      border-radius:50%;opacity:0;
      animation-fill-mode:both;
    }
    .orb1{
      width:12px;height:12px;
      background:#22C55E;box-shadow:0 0 12px #22C55E;
      margin:-6px 0 0 -6px;
      animation:orbit1 3.5s linear 1.4s infinite,fadeOrb 0.5s ease 1.4s forwards;
    }
    .orb2{
      width:9px;height:9px;
      background:#06B6D4;box-shadow:0 0 10px #06B6D4;
      margin:-4.5px 0 0 -4.5px;
      animation:orbit2 2.5s linear 1.6s infinite,fadeOrb 0.5s ease 1.6s forwards;
    }
    .orb3{
      width:7px;height:7px;
      background:#F59E0B;box-shadow:0 0 8px #F59E0B;
      margin:-3.5px 0 0 -3.5px;
      animation:orbit1 5s linear 1.8s infinite reverse,fadeOrb 0.5s ease 1.8s forwards;
    }
    @keyframes fadeOrb{from{opacity:0}to{opacity:1}}

    .name{
      font-family:'Fraunces',serif;
      font-size:3rem;font-weight:900;
      background:linear-gradient(135deg,#22C55E 0%,#06B6D4 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      animation:slideUp 0.6s ease 0.8s both;
      letter-spacing:-1px;
    }
    .sub{
      color:rgba(255,255,255,0.4);
      font-size:0.75rem;letter-spacing:2.5px;
      text-transform:uppercase;margin-top:6px;
      animation:slideUp 0.5s ease 1s both;
    }
    .country{
      color:rgba(255,255,255,0.2);
      font-size:0.7rem;margin-top:5px;
      animation:slideUp 0.5s ease 1.1s both;
    }

    .bar-outer{
      width:160px;height:3px;
      background:rgba(255,255,255,0.07);
      border-radius:3px;margin:30px auto 0;
      overflow:hidden;
      animation:slideUp 0.5s ease 1.2s both;
    }
    .bar-inner{
      height:100%;
      background:linear-gradient(90deg,#22C55E,#06B6D4,#22C55E);
      border-radius:3px;
      animation:progress 2.4s ease 1.3s both;
    }
    .loading-txt{
      color:rgba(255,255,255,0.2);
      font-size:0.7rem;margin-top:10px;
      animation:pulse 1s infinite 1.5s, slideUp 0.5s ease 1.3s both;
    }

    .version{
      position:fixed;bottom:14px;
      color:rgba(255,255,255,0.1);
      font-size:0.65rem;letter-spacing:1px;
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="orbit-system">
      <!-- AgriEquip Logo SVG -->
      <svg class="logo-svg" viewBox="0 0 115 115" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="115" y2="115" gradientUnits="userSpaceOnUse">
            <stop stop-color="#22C55E"/>
            <stop offset="1" stop-color="#06B6D4"/>
          </linearGradient>
          <linearGradient id="lg2" x1="0" y1="0" x2="115" y2="115" gradientUnits="userSpaceOnUse">
            <stop stop-color="#16A34A"/>
            <stop offset="1" stop-color="#0891B2"/>
          </linearGradient>
        </defs>
        <!-- App background rounded square -->
        <rect width="115" height="115" rx="26" fill="url(#lg1)"/>
        <!-- Inner depth -->
        <rect x="6" y="6" width="103" height="103" rx="22" fill="rgba(0,0,0,0.12)"/>
        <!-- Sky gradient area -->
        <rect x="10" y="10" width="95" height="50" rx="16" fill="rgba(255,255,255,0.05)"/>
        <!-- Sun -->
        <circle cx="22" cy="26" r="10" fill="rgba(255,255,255,0.18)"/>
        <circle cx="22" cy="26" r="6" fill="rgba(255,255,255,0.55)"/>
        <line x1="22" y1="12" x2="22" y2="9" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
        <line x1="31" y1="16" x2="33" y2="14" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
        <line x1="36" y1="26" x2="39" y2="26" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
        <!-- Tractor body -->
        <rect x="12" y="62" width="45" height="24" rx="7" fill="rgba(255,255,255,0.88)"/>
        <!-- Tractor cab -->
        <rect x="40" y="52" width="22" height="18" rx="6" fill="rgba(255,255,255,0.72)"/>
        <!-- Cab window -->
        <rect x="43" y="55" width="16" height="10" rx="3" fill="rgba(6,182,212,0.4)"/>
        <!-- Big wheel -->
        <circle cx="25" cy="86" r="14" fill="rgba(10,22,40,0.85)" stroke="rgba(255,255,255,0.9)" stroke-width="2.5"/>
        <circle cx="25" cy="86" r="7" fill="rgba(255,255,255,0.2)"/>
        <line x1="25" y1="72" x2="25" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        <line x1="11" y1="86" x2="39" y2="86" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        <!-- Small wheel -->
        <circle cx="54" cy="83" r="9" fill="rgba(10,22,40,0.85)" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
        <circle cx="54" cy="83" r="4.5" fill="rgba(255,255,255,0.2)"/>
        <!-- Wheat stalks right side -->
        <line x1="74" y1="86" x2="74" y2="36" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="74" cy="30" rx="5" ry="11" fill="rgba(255,255,255,0.8)" transform="rotate(-14 74 30)"/>
        <line x1="84" y1="86" x2="84" y2="40" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="84" cy="34" rx="4.5" ry="10" fill="rgba(255,255,255,0.7)" transform="rotate(10 84 34)"/>
        <line x1="94" y1="86" x2="94" y2="38" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="94" cy="32" rx="4" ry="9" fill="rgba(255,255,255,0.6)" transform="rotate(-6 94 32)"/>
        <!-- Ground lines -->
        <rect x="10" y="88" width="95" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
        <rect x="10" y="97" width="95" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
        <rect x="10" y="105" width="95" height="3" rx="1.5" fill="rgba(255,255,255,0.07)"/>
      </svg>
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="name">AgriEquip</div>
    <div class="sub">Agricultural Rental Marketplace</div>
    <div class="country">🇪🇹 Made in Ethiopia</div>

    <div class="bar-outer">
      <div class="bar-inner"></div>
    </div>
    <div class="loading-txt">Loading platform...</div>
  </div>

  <div class="version">v1.0.0</div>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    // Mark splash as seen and redirect
    sessionStorage.setItem('splashSeen', '1');
    setTimeout(() => {
      window.location.href = 'login.html';
    }, 3300);
  </script>
</body>
</html>
