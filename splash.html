<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriEquip</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,900;1,700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000}

    /* ===== KEYFRAMES ===== */
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes fadeOut{from{opacity:1}to{opacity:0;visibility:hidden}}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes progress{from{width:0%}to{width:100%}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

    /* Logo animations */
    @keyframes lightAppear{
      0%{transform:scale(0);opacity:0;filter:blur(20px)}
      60%{transform:scale(1.4);opacity:1;filter:blur(0)}
      100%{transform:scale(1);opacity:1;filter:blur(0)}
    }
    @keyframes logoBounce{
      0%{transform:scale(0.5) translateY(40px);opacity:0}
      50%{transform:scale(1.08) translateY(-12px);opacity:1}
      70%{transform:scale(0.97) translateY(4px)}
      85%{transform:scale(1.03) translateY(-2px)}
      100%{transform:scale(1) translateY(0);opacity:1}
    }
    @keyframes logoRotate{
      0%{transform:rotate(0deg) scale(1)}
      25%{transform:rotate(5deg) scale(1.03)}
      50%{transform:rotate(-3deg) scale(1)}
      75%{transform:rotate(2deg) scale(1.01)}
      100%{transform:rotate(0deg) scale(1)}
    }
    @keyframes logoPulse{
      0%,100%{box-shadow:0 0 40px rgba(34,197,94,0.4),0 0 80px rgba(34,197,94,0.2),0 20px 60px rgba(0,0,0,0.5)}
      50%{box-shadow:0 0 60px rgba(34,197,94,0.7),0 0 120px rgba(34,197,94,0.4),0 20px 60px rgba(0,0,0,0.5)}
    }
    @keyframes graphDraw{
      0%{stroke-dashoffset:200}
      100%{stroke-dashoffset:0}
    }
    @keyframes graphGlow{
      0%,100%{filter:drop-shadow(0 0 3px rgba(255,255,255,0.5))}
      50%{filter:drop-shadow(0 0 8px rgba(255,255,255,1))}
    }
    /* Particles */
    @keyframes particleFloat{
      0%{transform:translateY(0) translateX(0) scale(1);opacity:0.7}
      33%{transform:translateY(-30px) translateX(15px) scale(1.2);opacity:1}
      66%{transform:translateY(-60px) translateX(-10px) scale(0.8);opacity:0.5}
      100%{transform:translateY(-100px) translateX(5px) scale(0.3);opacity:0}
    }
    @keyframes orbitFloat{
      0%{transform:rotate(0deg) translateX(80px) rotate(0deg);opacity:0.8}
      100%{transform:rotate(360deg) translateX(80px) rotate(-360deg);opacity:0.8}
    }
    @keyframes orbitFloat2{
      0%{transform:rotate(180deg) translateX(110px) rotate(-180deg);opacity:0.6}
      100%{transform:rotate(540deg) translateX(110px) rotate(-540deg);opacity:0.6}
    }
    @keyframes orbitFloat3{
      0%{transform:rotate(60deg) translateX(55px) rotate(-60deg);opacity:0.9}
      100%{transform:rotate(420deg) translateX(55px) rotate(-420deg);opacity:0.9}
    }
    /* Wheat sway */
    @keyframes wheatSway{
      0%,100%{transform:rotate(-4deg) scaleX(1)}
      50%{transform:rotate(4deg) scaleX(-1)}
    }
    @keyframes leafSway{
      0%,100%{transform:rotate(0deg) translateY(0)}
      50%{transform:rotate(8deg) translateY(-5px)}
    }
    /* Light rays */
    @keyframes rayPulse{
      0%,100%{opacity:0.04;transform:scaleY(1)}
      50%{opacity:0.09;transform:scaleY(1.05)}
    }
    /* Text effects */
    @keyframes textGlow{
      0%,100%{text-shadow:0 0 20px rgba(34,197,94,0.3)}
      50%{text-shadow:0 0 40px rgba(34,197,94,0.6),0 0 60px rgba(34,197,94,0.3)}
    }
    /* Final fade to login */
    @keyframes screenFadeOut{
      0%{opacity:1}
      100%{opacity:0}
    }
    /* Mountain shimmer */
    @keyframes mountainGlow{
      0%,100%{opacity:0.06}
      50%{opacity:0.1}
    }

    /* ===== BACKGROUND ===== */
    .bg{
      position:fixed;inset:0;z-index:0;
      background:radial-gradient(ellipse at 50% 30%,
        #0a2e1a 0%,
        #061428 35%,
        #020b18 65%,
        #000 100%
      );
    }
    /* Subtle gradient overlay for depth */
    .bg-overlay{
      position:fixed;inset:0;z-index:1;
      background:
        radial-gradient(ellipse at 30% 60%,rgba(34,197,94,0.06) 0%,transparent 50%),
        radial-gradient(ellipse at 70% 40%,rgba(6,182,212,0.04) 0%,transparent 50%),
        radial-gradient(ellipse at 50% 50%,rgba(34,197,94,0.03) 0%,transparent 70%);
      animation:rayPulse 4s ease-in-out infinite;
    }

    /* ===== LIGHT RAYS ===== */
    .rays{
      position:fixed;inset:0;z-index:2;
      overflow:hidden;
      pointer-events:none;
    }
    .ray{
      position:absolute;
      top:0;
      width:2px;
      height:100%;
      background:linear-gradient(180deg,
        transparent 0%,
        rgba(34,197,94,0.06) 30%,
        rgba(34,197,94,0.08) 50%,
        rgba(34,197,94,0.06) 70%,
        transparent 100%
      );
      transform-origin:top center;
      animation:rayPulse 3s ease-in-out infinite;
    }

    /* ===== AGRICULTURAL BG ELEMENTS ===== */
    .agri-bg{
      position:fixed;inset:0;z-index:3;
      pointer-events:none;
      opacity:0;
      animation:fadeIn 1s ease 1.5s forwards;
    }

    /* Mountains silhouette */
    .mountains{
      position:absolute;bottom:0;left:0;right:0;
      animation:mountainGlow 5s ease-in-out infinite;
    }

    /* Wheat elements */
    .wheat-elem{
      position:absolute;
      font-size:2rem;
      opacity:0.07;
    }
    .wheat-1{bottom:15%;left:5%;animation:wheatSway 3s ease-in-out infinite;animation-delay:0s}
    .wheat-2{bottom:20%;right:6%;animation:wheatSway 3.5s ease-in-out infinite;animation-delay:0.5s}
    .wheat-3{bottom:12%;left:18%;animation:wheatSway 2.8s ease-in-out infinite;animation-delay:1s}
    .wheat-4{bottom:18%;right:20%;animation:wheatSway 4s ease-in-out infinite;animation-delay:0.3s}

    /* Leaf elements */
    .leaf-elem{
      position:absolute;
      opacity:0.06;
      font-size:1.5rem;
    }
    .leaf-1{top:15%;left:8%;animation:leafSway 4s ease-in-out infinite}
    .leaf-2{top:20%;right:10%;animation:leafSway 3.5s ease-in-out infinite;animation-delay:1s}
    .leaf-3{top:35%;left:4%;animation:leafSway 5s ease-in-out infinite;animation-delay:0.5s}
    .leaf-4{top:30%;right:5%;animation:leafSway 4.5s ease-in-out infinite;animation-delay:1.5s}

    /* ===== FLOATING PARTICLES ===== */
    .particles{
      position:fixed;inset:0;z-index:4;
      pointer-events:none;
      opacity:0;
      animation:fadeIn 0.8s ease 1s forwards;
    }
    .particle{
      position:absolute;
      border-radius:50%;
      animation:particleFloat linear infinite;
    }

    /* Orbit particles */
    .orbit-system{
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:0;height:0;
      opacity:0;
      animation:fadeIn 0.5s ease 2.5s forwards;
    }
    .orb{
      position:absolute;
      border-radius:50%;
      top:0;left:0;
    }
    .orb1{
      width:8px;height:8px;
      background:radial-gradient(circle,#22C55E,#16A34A);
      box-shadow:0 0 12px #22C55E;
      margin:-4px 0 0 -4px;
      animation:orbitFloat 4s linear infinite;
    }
    .orb2{
      width:5px;height:5px;
      background:radial-gradient(circle,#06B6D4,#0891B2);
      box-shadow:0 0 8px #06B6D4;
      margin:-2.5px 0 0 -2.5px;
      animation:orbitFloat2 6s linear infinite;
    }
    .orb3{
      width:6px;height:6px;
      background:radial-gradient(circle,#F59E0B,#D97706);
      box-shadow:0 0 10px #F59E0B;
      margin:-3px 0 0 -3px;
      animation:orbitFloat3 3s linear infinite;
    }

    /* ===== MAIN CONTENT ===== */
    .content{
      position:fixed;inset:0;z-index:10;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:20px;
    }

    /* Central light source */
    .light-source{
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-65%);
      width:4px;height:4px;
      background:#22C55E;
      border-radius:50%;
      box-shadow:0 0 0 0 rgba(34,197,94,0);
      opacity:0;
      animation:lightAppear 0.8s cubic-bezier(0.34,1.6,0.64,1) 0.5s both;
    }

    /* Logo container */
    .logo-wrap{
      position:relative;
      margin-bottom:40px;
      opacity:0;
      animation:logoBounce 1.2s cubic-bezier(0.34,1.4,0.64,1) 1s forwards;
    }
    .logo-wrap.rotate{
      animation:logoRotate 1.5s ease 2.5s both;
    }
    .logo-wrap.pulse{
      animation:logoPulse 2s ease-in-out 4s infinite;
    }

    /* The actual logo icon */
    .logo-icon{
      width:130px;height:130px;
      border-radius:32px;
      position:relative;
      overflow:hidden;
      /* 3D glassmorphism effect */
      background:linear-gradient(145deg,
        rgba(34,197,94,0.9) 0%,
        rgba(22,163,74,0.95) 40%,
        rgba(16,122,55,0.98) 100%
      );
      box-shadow:
        0 0 40px rgba(34,197,94,0.5),
        0 0 80px rgba(34,197,94,0.25),
        0 25px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.3),
        inset 0 -2px 4px rgba(0,0,0,0.2);
      border:1.5px solid rgba(255,255,255,0.2);
    }

    /* Glossy highlight on top */
    .logo-icon::before{
      content:'';
      position:absolute;
      top:0;left:0;right:0;
      height:55%;
      background:linear-gradient(180deg,
        rgba(255,255,255,0.25) 0%,
        rgba(255,255,255,0.08) 50%,
        transparent 100%
      );
      border-radius:32px 32px 50% 50%;
      z-index:2;
    }

    /* Bottom reflection */
    .logo-icon::after{
      content:'';
      position:absolute;
      bottom:0;left:0;right:0;
      height:30%;
      background:linear-gradient(0deg,
        rgba(0,0,0,0.25) 0%,
        transparent 100%
      );
      z-index:2;
    }

    /* Logo SVG */
    .logo-svg{
      position:relative;z-index:3;
      width:100%;height:100%;
      display:flex;align-items:center;justify-content:center;
      padding:22px;
    }

    /* Side glow rings */
    .glow-ring{
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(34,197,94,0.2);
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      pointer-events:none;
    }
    .ring1{width:170px;height:170px;animation:logoPulse 2s ease-in-out infinite}
    .ring2{width:210px;height:210px;border-color:rgba(34,197,94,0.1);animation:logoPulse 2s ease-in-out 0.3s infinite}
    .ring3{width:260px;height:260px;border-color:rgba(34,197,94,0.05);animation:logoPulse 2s ease-in-out 0.6s infinite}

    /* Text */
    .logo-name{
      font-family:'Fraunces',serif;
      font-size:2.6rem;font-weight:900;
      color:white;
      letter-spacing:-0.5px;
      text-align:center;
      opacity:0;
      animation:slideUp 0.8s ease 2.2s both,textGlow 3s ease-in-out 3s infinite;
      text-shadow:0 2px 20px rgba(34,197,94,0.4);
    }
    .logo-sub{
      font-family:'Poppins',sans-serif;
      font-size:0.75rem;
      font-weight:400;
      color:rgba(255,255,255,0.5);
      letter-spacing:4px;
      text-transform:uppercase;
      text-align:center;
      margin-top:8px;
      opacity:0;
      animation:slideUp 0.7s ease 2.5s both;
    }
    .logo-tagline{
      font-family:'Poppins',sans-serif;
      font-size:0.72rem;
      font-weight:300;
      color:rgba(255,255,255,0.35);
      letter-spacing:2px;
      text-align:center;
      margin-top:4px;
      opacity:0;
      animation:slideUp 0.6s ease 2.7s both;
    }
    .dot-sep{color:#22C55E;opacity:0.7}

    /* Loading bar */
    .bar-section{
      margin-top:48px;
      opacity:0;
      animation:fadeIn 0.5s ease 2.8s forwards;
    }
    .bar-outer{
      width:180px;height:2px;
      background:rgba(255,255,255,0.08);
      border-radius:2px;overflow:hidden;
    }
    .bar-inner{
      height:100%;
      background:linear-gradient(90deg,#22C55E,#06B6D4,#22C55E);
      background-size:200%;
      border-radius:2px;
      animation:progress 4.5s ease 3s both;
    }
    .bar-txt{
      color:rgba(255,255,255,0.2);
      font-size:0.62rem;letter-spacing:2px;
      text-transform:uppercase;text-align:center;
      margin-top:10px;
      font-family:'Poppins',sans-serif;
      animation:blink 1.5s infinite 3.2s;
    }

    /* Country badge */
    .country{
      position:fixed;bottom:18px;
      font-family:'Poppins',sans-serif;
      font-size:0.62rem;
      color:rgba(255,255,255,0.15);
      letter-spacing:1.5px;
      text-transform:uppercase;
      opacity:0;
      animation:fadeIn 0.5s ease 3s forwards;
    }

    /* Full screen fade out at end */
    .screen-fade{
      position:fixed;inset:0;z-index:999;
      background:#000;
      opacity:0;pointer-events:none;
      animation:fadeIn 0.8s ease 7.5s forwards;
    }
  </style>
</head>
<body>
  <!-- Background layers -->
  <div class="bg"></div>
  <div class="bg-overlay"></div>

  <!-- Light rays -->
  <div class="rays" id="rays"></div>

  <!-- Agricultural background -->
  <div class="agri-bg">
    <!-- Mountain SVG -->
    <svg class="mountains" viewBox="0 0 400 120" preserveAspectRatio="none" style="height:160px">
      <defs>
        <linearGradient id="mtGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#22C55E" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#22C55E" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      <path d="M0 120 L40 60 L80 90 L130 30 L180 70 L220 20 L270 65 L310 35 L360 75 L400 45 L400 120 Z" fill="url(#mtGrad)"/>
      <path d="M0 120 L60 80 L100 95 L150 55 L200 85 L250 50 L300 80 L350 60 L400 80 L400 120 Z" fill="rgba(34,197,94,0.04)"/>
    </svg>
    <!-- Wheat -->
    <div class="wheat-elem wheat-1">🌾</div>
    <div class="wheat-elem wheat-2">🌾</div>
    <div class="wheat-elem wheat-3">🌿</div>
    <div class="wheat-elem wheat-4">🌿</div>
    <!-- Leaves -->
    <div class="leaf-elem leaf-1">🍃</div>
    <div class="leaf-elem leaf-2">🍃</div>
    <div class="leaf-elem leaf-3">🌱</div>
    <div class="leaf-elem leaf-4">🌱</div>
  </div>

  <!-- Floating particles -->
  <div class="particles" id="particles">
    <div class="orbit-system">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="content">
    <div class="light-source" id="lightSource"></div>

    <div class="logo-wrap" id="logoWrap">
      <!-- Glow rings -->
      <div class="glow-ring ring1"></div>
      <div class="glow-ring ring2"></div>
      <div class="glow-ring ring3"></div>

      <!-- Logo icon -->
      <div class="logo-icon">
        <div class="logo-svg">
          <svg width="86" height="86" viewBox="0 0 86 86" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Grid lines (glassmorphism) -->
            <line x1="0" y1="65" x2="86" y2="65" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <line x1="0" y1="43" x2="86" y2="43" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
            <line x1="0" y1="22" x2="86" y2="22" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

            <!-- Graph area fill -->
            <defs>
              <linearGradient id="graphFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
              </linearGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="2" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <!-- Filled area under graph -->
            <path d="M10 72 L22 58 L34 48 L44 36 L58 24 L72 14 L76 14 L76 72 Z"
              fill="url(#graphFill)"/>

            <!-- Graph line (animated) -->
            <polyline
              id="graphLine"
              points="10,72 22,58 34,48 44,36 58,24 72,14"
              stroke="white"
              stroke-width="3.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"
              filter="url(#glow)"
              stroke-dasharray="200"
              stroke-dashoffset="200"
              style="animation:graphDraw 1.5s ease 1.8s forwards,graphGlow 2s ease-in-out 3.5s infinite"
            />

            <!-- Data points -->
            <circle cx="22" cy="58" r="4" fill="white" opacity="0" style="animation:fadeIn 0.3s ease 2.5s forwards"/>
            <circle cx="34" cy="48" r="4" fill="white" opacity="0" style="animation:fadeIn 0.3s ease 2.7s forwards"/>
            <circle cx="44" cy="36" r="4" fill="white" opacity="0" style="animation:fadeIn 0.3s ease 2.9s forwards"/>
            <circle cx="58" cy="24" r="4" fill="white" opacity="0" style="animation:fadeIn 0.3s ease 3.1s forwards"/>
            <circle cx="72" cy="14" r="5" fill="white" opacity="0" style="animation:fadeIn 0.3s ease 3.3s forwards"/>

            <!-- Arrow tip at top -->
            <path d="M66 8 L72 14 L78 8" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0" style="animation:fadeIn 0.4s ease 3.4s forwards"/>

            <!-- Bottom axis -->
            <line x1="10" y1="72" x2="76" y2="72" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>

            <!-- Small wheat icon bottom-left -->
            <text x="6" y="84" font-size="10" opacity="0.5" style="animation:fadeIn 0.4s ease 3.5s forwards;opacity:0">🌾</text>
          </svg>
        </div>
      </div>
    </div>

    <!-- App name -->
    <div class="logo-name">AgriEquip</div>
    <div class="logo-sub">Grow <span class="dot-sep">•</span> Invest <span class="dot-sep">•</span> Prosper</div>
    <div class="logo-tagline">Agricultural Rental Marketplace</div>

    <!-- Loading -->
    <div class="bar-section">
      <div class="bar-outer">
        <div class="bar-inner"></div>
      </div>
      <div class="bar-txt">Loading...</div>
    </div>
  </div>

  <!-- Country badge -->
  <div class="country">🇪🇹 Ethiopia</div>

  <!-- Fade to black before transition -->
  <div class="screen-fade"></div>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

    // Generate light rays
    const raysEl = document.getElementById('rays');
    for (let i = 0; i < 12; i++) {
      const ray = document.createElement('div');
      ray.className = 'ray';
      ray.style.cssText = `
        left:${5 + i * 8}%;
        transform:rotate(${(i - 6) * 3}deg);
        animation-delay:${i * 0.2}s;
        opacity:${0.03 + Math.random() * 0.05};
      `;
      raysEl.appendChild(ray);
    }

    // Generate floating particles
    const particlesEl = document.getElementById('particles');
    const colors = ['#22C55E','#16A34A','#06B6D4','#F59E0B','#86EFAC'];
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 2 + Math.random() * 5;
      const color = colors[Math.floor(Math.random() * colors.length)];
      p.style.cssText = `
        width:${size}px;height:${size}px;
        background:${color};
        left:${Math.random() * 100}%;
        top:${30 + Math.random() * 50}%;
        opacity:${0.3 + Math.random() * 0.5};
        animation-duration:${3 + Math.random() * 5}s;
        animation-delay:${Math.random() * 4}s;
        box-shadow:0 0 ${size * 2}px ${color};
      `;
      particlesEl.appendChild(p);
    }

    // Animate logo stages
    const logoWrap = document.getElementById('logoWrap');

    // Stage 2: rotation after bounce
    setTimeout(() => {
      logoWrap.style.animation = 'logoRotate 1.5s ease forwards';
    }, 2500);

    // Stage 3: pulse after rotation
    setTimeout(() => {
      logoWrap.style.animation = 'logoPulse 2s ease-in-out infinite';
    }, 4200);

       // Redirect
    sessionStorage.setItem('splashSeen', '1');
    setTimeout(() => {
      window.location.href = 'login.html';
    }, 8200);
  </script>
</body>
</html>
