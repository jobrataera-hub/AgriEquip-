<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriEquip</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0a1628;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:100vh;overflow:hidden;
      font-family:'Poppins',sans-serif;
    }

    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes progress{from{width:0%}to{width:100%}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    @keyframes bgBreath{0%,100%{opacity:0.4}50%{opacity:1}}

    /* Logo part animations */
    @keyframes tractorDrive{
      0%{transform:translateX(-30px);opacity:0}
      30%{transform:translateX(0);opacity:1}
      85%{transform:translateX(0)}
      100%{transform:translateX(5px)}
    }
    @keyframes wheelSpin{
      from{transform-origin:center;transform:rotate(0deg)}
      to{transform-origin:center;transform:rotate(360deg)}
    }
    @keyframes wheatSway{
      0%,100%{transform:rotate(-3deg);transform-origin:bottom center}
      50%{transform:rotate(3deg);transform-origin:bottom center}
    }
    @keyframes sunRise{
      0%{transform:translateY(20px);opacity:0}
      40%{transform:translateY(0);opacity:1}
      100%{transform:translateY(0);opacity:1}
    }
    @keyframes sunGlow{
      0%,100%{filter:drop-shadow(0 0 8px rgba(255,200,0,0.4))}
      50%{filter:drop-shadow(0 0 20px rgba(255,200,0,0.8))}
    }
    @keyframes logoScale{
      0%{transform:scale(0.5);opacity:0}
      60%{transform:scale(1.08)}
      100%{transform:scale(1);opacity:1}
    }
    @keyframes orbit1{
      from{transform:rotate(0deg) translateX(80px) rotate(0deg)}
      to{transform:rotate(360deg) translateX(80px) rotate(-360deg)}
    }
    @keyframes orbit2{
      from{transform:rotate(180deg) translateX(62px) rotate(-180deg)}
      to{transform:rotate(540deg) translateX(62px) rotate(-540deg)}
    }
    @keyframes floatLogo{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-12px)}
    }
    @keyframes glowLogo{
      0%,100%{filter:drop-shadow(0 0 15px rgba(34,197,94,0.4))}
      50%{filter:drop-shadow(0 0 40px rgba(34,197,94,0.9))}
    }
    @keyframes cloudFloat{
      0%,100%{transform:translateX(0)}
      50%{transform:translateX(8px)}
    }
    @keyframes grassGrow{
      from{transform:scaleY(0);transform-origin:bottom}
      to{transform:scaleY(1);transform-origin:bottom}
    }

    .bg{
      position:fixed;inset:0;
      background:
        radial-gradient(ellipse at 20% 30%,rgba(34,197,94,0.09) 0%,transparent 55%),
        radial-gradient(ellipse at 80% 70%,rgba(6,182,212,0.07) 0%,transparent 55%);
      animation:bgBreath 4s ease-in-out infinite;
    }

    .wrap{text-align:center;position:relative;z-index:10;padding:20px}

    .orbit-system{
      position:relative;width:180px;height:180px;
      margin:0 auto 28px;
    }
    .logo-svg{
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:130px;height:130px;
      animation:logoScale 1s cubic-bezier(0.34,1.4,0.64,1) 0.3s both,
                floatLogo 3.5s ease-in-out 1.5s infinite,
                glowLogo 3s ease-in-out 1.5s infinite;
    }

    /* Animated SVG parts */
    .tractor-group{animation:tractorDrive 1.2s cubic-bezier(0.34,1.2,0.64,1) 0.8s both}
    .wheel-big{
      transform-origin:25px 86px;
      animation:wheelSpin 1s linear 0.8s infinite;
    }
    .wheel-small{
      transform-origin:54px 83px;
      animation:wheelSpin 0.8s linear 0.8s infinite;
    }
    .wheat1{
      transform-origin:74px 86px;
      animation:wheatSway 2s ease-in-out 1.3s infinite;
    }
    .wheat2{
      transform-origin:84px 86px;
      animation:wheatSway 2s ease-in-out 1.5s infinite;
    }
    .wheat3{
      transform-origin:94px 86px;
      animation:wheatSway 2s ease-in-out 1.7s infinite;
    }
    .sun-group{animation:sunRise 1.2s ease 0.5s both,sunGlow 2.5s ease-in-out 2s infinite}
    .cloud1{animation:cloudFloat 4s ease-in-out 2s infinite}
    .cloud2{animation:cloudFloat 5s ease-in-out 2.5s infinite reverse}

    .orb{
      position:absolute;top:50%;left:50%;
      border-radius:50%;opacity:0;
    }
    .orb1{
      width:11px;height:11px;background:#22C55E;
      box-shadow:0 0 12px #22C55E;margin:-5.5px 0 0 -5.5px;
      animation:orbit1 3.5s linear 1.5s infinite,fadeIn 0.5s ease 1.5s forwards;
    }
    .orb2{
      width:8px;height:8px;background:#06B6D4;
      box-shadow:0 0 10px #06B6D4;margin:-4px 0 0 -4px;
      animation:orbit2 2.5s linear 1.7s infinite,fadeIn 0.5s ease 1.7s forwards;
    }
    .orb3{
      width:6px;height:6px;background:#F59E0B;
      box-shadow:0 0 8px #F59E0B;margin:-3px 0 0 -3px;
      animation:orbit1 5s linear 1.9s infinite reverse,fadeIn 0.5s ease 1.9s forwards;
    }

    .name{
      font-family:'Fraunces',serif;font-size:3rem;font-weight:900;
      background:linear-gradient(135deg,#22C55E,#06B6D4);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      animation:slideUp 0.6s ease 0.9s both;
      letter-spacing:-1px;
    }
    .sub{
      color:rgba(255,255,255,0.4);font-size:0.76rem;
      letter-spacing:2.5px;text-transform:uppercase;
      margin-top:6px;animation:slideUp 0.5s ease 1.1s both;
    }
    .country{
      color:rgba(255,255,255,0.2);font-size:0.7rem;
      margin-top:5px;animation:slideUp 0.5s ease 1.2s both;
    }

    .bar-outer{
      width:160px;height:3px;background:rgba(255,255,255,0.07);
      border-radius:3px;margin:28px auto 0;overflow:hidden;
      animation:slideUp 0.5s ease 1.3s both;
    }
    .bar-inner{
      height:100%;
      background:linear-gradient(90deg,#22C55E,#06B6D4,#22C55E);
      border-radius:3px;
      animation:progress 3.5s ease 1.4s both;
    }
    .loading-txt{
      color:rgba(255,255,255,0.2);font-size:0.7rem;
      margin-top:10px;
      animation:pulse 1s infinite 1.6s,slideUp 0.5s ease 1.4s both;
    }
    .version{position:fixed;bottom:14px;color:rgba(255,255,255,0.1);font-size:0.65rem;letter-spacing:1px}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <div class="orbit-system">
      <svg class="logo-svg" viewBox="0 0 115 115" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="115" y2="115" gradientUnits="userSpaceOnUse">
            <stop stop-color="#22C55E"/><stop offset="1" stop-color="#06B6D4"/>
          </linearGradient>
        </defs>
        <!-- Background -->
        <rect width="115" height="115" rx="26" fill="url(#lg1)"/>
        <rect x="6" y="6" width="103" height="103" rx="22" fill="rgba(0,0,0,0.12)"/>
        <!-- Sky -->
        <rect x="10" y="10" width="95" height="52" rx="16" fill="rgba(255,255,255,0.05)"/>
        <!-- Sun (animated) -->
        <g class="sun-group">
          <circle cx="22" cy="26" r="10" fill="rgba(255,255,255,0.18)"/>
          <circle cx="22" cy="26" r="6" fill="rgba(255,255,255,0.6)"/>
          <line x1="22" y1="12" x2="22" y2="9" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>
          <line x1="31" y1="16" x2="33" y2="14" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>
          <line x1="34" y1="26" x2="37" y2="26" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>
          <line x1="31" y1="36" x2="33" y2="38" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
        </g>
        <!-- Clouds -->
        <g class="cloud1">
          <ellipse cx="60" cy="20" rx="12" ry="5" fill="rgba(255,255,255,0.12)"/>
          <ellipse cx="55" cy="22" rx="8" ry="4" fill="rgba(255,255,255,0.1)"/>
        </g>
        <g class="cloud2">
          <ellipse cx="85" cy="18" rx="10" ry="4" fill="rgba(255,255,255,0.08)"/>
        </g>
        <!-- Tractor group (animated) -->
        <g class="tractor-group">
          <!-- Tractor body -->
          <rect x="12" y="62" width="45" height="24" rx="7" fill="rgba(255,255,255,0.88)"/>
          <!-- Cab -->
          <rect x="40" y="52" width="22" height="18" rx="6" fill="rgba(255,255,255,0.72)"/>
          <!-- Window -->
          <rect x="43" y="55" width="16" height="10" rx="3" fill="rgba(6,182,212,0.45)"/>
          <!-- Exhaust pipe -->
          <rect x="58" y="48" width="3" height="8" rx="1.5" fill="rgba(255,255,255,0.6)"/>
          <ellipse cx="59.5" cy="47" rx="3" ry="2" fill="rgba(255,255,255,0.3)"/>
          <!-- Big wheel (spinning) -->
          <circle class="wheel-big" cx="25" cy="86" r="14" fill="rgba(10,22,40,0.85)" stroke="rgba(255,255,255,0.9)" stroke-width="2.5"/>
          <circle cx="25" cy="86" r="6" fill="rgba(255,255,255,0.2)"/>
          <line x1="25" y1="72" x2="25" y2="100" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
          <line x1="11" y1="86" x2="39" y2="86" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
          <!-- Small wheel (spinning) -->
          <circle class="wheel-small" cx="54" cy="83" r="9" fill="rgba(10,22,40,0.85)" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
          <circle cx="54" cy="83" r="4" fill="rgba(255,255,255,0.2)"/>
        </g>
        <!-- Wheat stalks (swaying) -->
        <g class="wheat1">
          <line x1="74" y1="86" x2="74" y2="36" stroke="rgba(255,255,255,0.82)" stroke-width="2.5" stroke-linecap="round"/>
          <ellipse cx="74" cy="30" rx="5" ry="11" fill="rgba(255,255,255,0.82)" transform="rotate(-12 74 30)"/>
          <line x1="70" y1="50" x2="74" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="70" y1="60" x2="74" y2="60" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        </g>
        <g class="wheat2">
          <line x1="84" y1="86" x2="84" y2="40" stroke="rgba(255,255,255,0.72)" stroke-width="2" stroke-linecap="round"/>
          <ellipse cx="84" cy="34" rx="4.5" ry="10" fill="rgba(255,255,255,0.72)" transform="rotate(10 84 34)"/>
          <line x1="80" y1="54" x2="84" y2="54" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        </g>
        <g class="wheat3">
          <line x1="94" y1="86" x2="94" y2="38" stroke="rgba(255,255,255,0.62)" stroke-width="2" stroke-linecap="round"/>
          <ellipse cx="94" cy="32" rx="4" ry="9" fill="rgba(255,255,255,0.62)" transform="rotate(-6 94 32)"/>
        </g>
        <!-- Ground -->
        <rect x="10" y="88" width="95" height="5" rx="2.5" fill="rgba(255,255,255,0.22)"/>
        <rect x="10" y="97" width="95" height="4" rx="2" fill="rgba(255,255,255,0.13)"/>
        <rect x="10" y="105" width="95" height="3" rx="1.5" fill="rgba(255,255,255,0.07)"/>
      </svg>
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="name">AgriEquip</div>
    <div class="sub">Agricultural Rental Marketplace</div>
    <div class="country">🇪🇹 Made in Ethiopia</div>

    <div class="bar-outer"><div class="bar-inner"></div></div>
    <div class="loading-txt">Loading platform...</div>
  </div>
  <div class="version">v1.0.0</div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    sessionStorage.setItem('splashSeen', '1');
    setTimeout(() => { window.location.href = 'login.html'; }, 5000);
  </script>
</body>
</html>
