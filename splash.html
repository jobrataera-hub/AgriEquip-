<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22C55E">
  <link rel="manifest" href="manifest.json">
  <title>AgriEquip</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0a1628;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:100vh;overflow:hidden;font-family:'Poppins',sans-serif;
    }
    @keyframes scaleUp{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.15) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
    @keyframes glow{0%,100%{filter:drop-shadow(0 0 15px rgba(34,197,94,0.4))}50%{filter:drop-shadow(0 0 45px rgba(34,197,94,0.9))}}
    @keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    @keyframes progress{from{width:0%}to{width:100%}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    @keyframes orbit1{from{transform:rotate(0deg) translateX(72px) rotate(0deg)}to{transform:rotate(360deg) translateX(72px) rotate(-360deg)}}
    @keyframes orbit2{from{transform:rotate(180deg) translateX(55px) rotate(-180deg)}to{transform:rotate(540deg) translateX(55px) rotate(-540deg)}}
    @keyframes grain{0%{opacity:0.6}100%{opacity:0.2}}

    .bg{
      position:fixed;inset:0;
      background:radial-gradient(ellipse at 30% 40%,rgba(34,197,94,0.07) 0%,transparent 60%),
                radial-gradient(ellipse at 70% 60%,rgba(6,182,212,0.07) 0%,transparent 60%);
    }

    .wrap{text-align:center;position:relative;z-index:10;padding:20px}

    .logo-orbit{
      position:relative;width:160px;height:160px;
      margin:0 auto 24px;
    }
    .logo-svg{
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:110px;height:110px;
      animation:scaleUp 1s cubic-bezier(0.34,1.56,0.64,1) both, float 4s ease-in-out 1.2s infinite, glow 3s ease-in-out 1.2s infinite;
    }
    .orb{
      position:absolute;top:50%;left:50%;
      width:12px;height:12px;border-radius:50%;
      margin:-6px 0 0 -6px;
    }
    .orb1{background:#22C55E;box-shadow:0 0 12px #22C55E;animation:orbit1 3.5s linear 1.2s infinite}
    .orb2{background:#06B6D4;box-shadow:0 0 10px #06B6D4;animation:orbit2 2.5s linear 1.2s infinite;width:8px;height:8px;margin:-4px 0 0 -4px}
    .orb3{background:#F59E0B;box-shadow:0 0 8px #F59E0B;animation:orbit1 5s linear 1.5s infinite reverse;width:6px;height:6px;margin:-3px 0 0 -3px}

    .name{
      font-family:'Fraunces',serif;font-size:2.8rem;font-weight:900;
      background:linear-gradient(135deg,#22C55E,#06B6D4,#22C55E);
      background-size:200%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      animation:slideUp 0.6s ease 0.7s both;
      letter-spacing:-1px;
    }
    .sub{color:rgba(255,255,255,0.4);font-size:0.78rem;letter-spacing:2px;text-transform:uppercase;margin-top:5px;animation:slideUp 0.5s ease 0.9s both}
    .country{color:rgba(255,255,255,0.2);font-size:0.7rem;margin-top:4px;animation:slideUp 0.5s ease 1.1s both}

    .bar-outer{width:160px;height:2px;background:rgba(255,255,255,0.07);border-radius:2px;margin:28px auto 0;overflow:hidden;animation:slideUp 0.5s ease 1.2s both}
    .bar-inner{height:100%;background:linear-gradient(90deg,#22C55E,#06B6D4);animation:progress 2.5s ease 1.2s both}
    .loading{color:rgba(255,255,255,0.2);font-size:0.7rem;margin-top:10px;animation:pulse 1s infinite 1.5s}

    .install-hint{
      position:fixed;bottom:30px;
      background:rgba(34,197,94,0.1);
      border:1px solid rgba(34,197,94,0.2);
      color:rgba(255,255,255,0.5);
      padding:8px 16px;border-radius:50px;
      font-size:0.72rem;display:none;
      animation:slideUp 0.5s ease both;
    }
    .version{position:fixed;bottom:10px;color:rgba(255,255,255,0.1);font-size:0.65rem}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <div class="logo-orbit">
      <svg class="logo-svg" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="110" y2="110" gradientUnits="userSpaceOnUse">
            <stop stop-color="#22C55E"/>
            <stop offset="1" stop-color="#06B6D4"/>
          </linearGradient>
          <linearGradient id="g2" x1="0" y1="0" x2="110" y2="110" gradientUnits="userSpaceOnUse">
            <stop stop-color="#16A34A"/>
            <stop offset="1" stop-color="#0891B2"/>
          </linearGradient>
        </defs>
        <!-- App background -->
        <rect width="110" height="110" rx="28" fill="url(#g1)"/>
        <!-- Inner card -->
        <rect x="8" y="8" width="94" height="94" rx="22" fill="rgba(0,0,0,0.15)"/>
        <!-- Ground/field lines -->
        <rect x="15" y="80" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
        <rect x="15" y="89" width="80" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
        <!-- Tractor -->
        <rect x="15" y="55" width="42" height="26" rx="6" fill="rgba(255,255,255,0.85)"/>
        <rect x="42" y="46" width="20" height="17" rx="5" fill="rgba(255,255,255,0.7)"/>
        <!-- Tractor wheel big -->
        <circle cx="28" cy="81" r="13" fill="rgba(10,22,40,0.8)" stroke="white" stroke-width="2.5"/>
        <circle cx="28" cy="81" r="6" fill="rgba(255,255,255,0.25)"/>
        <!-- Tractor wheel small -->
        <circle cx="52" cy="78" r="9" fill="rgba(10,22,40,0.8)" stroke="white" stroke-width="2"/>
        <circle cx="52" cy="78" r="4" fill="rgba(255,255,255,0.25)"/>
        <!-- Wheat stalks -->
        <line x1="72" y1="78" x2="72" y2="32" stroke="rgba(255,255,255,0.75)" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="72" cy="27" rx="5" ry="10" fill="rgba(255,255,255,0.75)" transform="rotate(-12 72 27)"/>
        <line x1="82" y1="78" x2="82" y2="36" stroke="rgba(255,255,255,0.65)" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="82" cy="31" rx="4" ry="9" fill="rgba(255,255,255,0.65)" transform="rotate(8 82 31)"/>
        <line x1="92" y1="78" x2="92" y2="34" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="92" cy="29" rx="4" ry="9" fill="rgba(255,255,255,0.55)" transform="rotate(-5 92 29)"/>
        <!-- Sun -->
        <circle cx="20" cy="22" r="11" fill="rgba(255,255,255,0.2)"/>
        <circle cx="20" cy="22" r="6" fill="rgba(255,255,255,0.5)"/>
        <!-- Sun rays -->
        <line x1="20" y1="8" x2="20" y2="5" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
        <line x1="30" y1="12" x2="32" y2="10" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
        <line x1="34" y1="22" x2="37" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="name">AgriEquip</div>
    <div class="sub">Agricultural Rental Marketplace</div>
    <div class="country">🇪🇹 Made in Ethiopia</div>

    <div class="bar-outer"><div class="bar-inner"></div></div>
    <div class="loading">Loading...</div>
  </div>

  <div class="install-hint" id="installHint">📲 Tap Share → Add to Home Screen to install</div>
  <div class="version">v1.0.0</div>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    // Show install hint on iOS
    const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    if (isIOS && !navigator.standalone) {
      setTimeout(() => {
        document.getElementById('installHint').style.display = 'block';
      }, 1500);
    }
    // Redirect
    setTimeout(() => { window.location.href = 'login.html'; }, 3300);
  </script>
</body>
</html>
