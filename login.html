<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriEquip - Login</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div style="max-width:400px;margin:100px auto;padding:20px">
    <h2>AgriEquip Login</h2>
    <input type="email" id="email" placeholder="Email" style="width:100%;padding:10px;margin:10px 0"><br>
    <input type="password" id="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0"><br>
    <button id="loginBtn" style="width:100%;padding:10px;background:#22C55E;color:white;border:none;border-radius:5px">Login</button>
    <button id="registerBtn" style="width:100%;padding:10px;margin-top:10px;background:#06B6D4;color:white;border:none;border-radius:5px">Register</button>
    <p id="message" style="color:red"></p>
  </div>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
